<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width" , initial-scale="1.0">
        <title>Document</title>
        <link rel="stylesheet" href="signupstyler.css">
    </head>
    <body>
        <div class="box">
            <form>
                <h1>Sign Up</h1>
                <p>Please fill in this form to create an account!</p><br>
                <hr>
                <br>
                <div class="name-row">
                    <input type="text" id="first" placeholder="First Name">
                    <input type="text" id="last" placeholder="Last Name">
                </div>
                <div>
                    <input type="email" id="mail" placeholder="Email" style="width: 100%;">

                </div>
                <div>
                    <input type="password" id="pass" placeholder="Password" style="width: 100%;">
                </div>
                 <div>
                    <input type="password" id="cpass" placeholder="Confirm Password" style="width: 100%;">
                </div>
                <div>
                    <label>
                    <input type="checkbox" id="check"> 
                    <p>I accept the <span>Terms of Use</span> & <span>Privacy Policy</span>.</p>
                    </label>
                </div>
                <button style="width: 100px; height: 40px; font-size: 18px; padding: 5px; background-color:rgb(53, 113, 226); color: white; font-weight: 600; font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;">Login</button>
            </form>
        </div>
        <div class="ls">
            <p>Already have an account?</p><a href="./loginform.html">Login here.</a>
        </div>
    </body>
</html>
